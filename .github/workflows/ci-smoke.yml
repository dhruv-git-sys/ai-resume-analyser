name: CI Smoke Test

on:
  push:
    branches: [ main ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Basic smoke checks
        run: |
          echo "CI smoke test: $(date)"
          echo "Current user: $(whoami)"
          echo "Listing repository files:"
          ls -la
          echo "Environment summary:"
          uname -a
