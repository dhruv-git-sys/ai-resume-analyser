name: CI/CD Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Prepare repo archive
        run: |
          # create a tarball of the repository without the .git folder
          TARFILE=repo.tar.gz
          git rev-parse --verify HEAD
          git archive -o ${TARFILE} HEAD

      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      - name: Copy repo archive to EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          # write the private key safely (preserve newlines)
          printf '%s' "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          TARFILE=repo.tar.gz
          # quick SSH auth test before copying the file
          echo "Testing SSH connectivity to ${EC2_USER}@${EC2_HOST}:${EC2_SSH_PORT}"
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -p ${EC2_SSH_PORT} ${EC2_USER}@${EC2_HOST} 'echo ok' || (
            echo "SSH authentication failed. Please verify the private key in the EC2_SSH_PRIVATE_KEY secret matches the EC2 instance's authorized_keys for ${EC2_USER}@${EC2_HOST}" && exit 1
          )
          scp -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key -P ${EC2_SSH_PORT} ${TARFILE} ${EC2_USER}@${EC2_HOST}:~/repo.tar.gz

      - name: Build & run on EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          CONTAINER_NAME: ai-resume
          PORT: 3000
        run: |
          chmod 600 ~/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -p ${EC2_SSH_PORT} -i ~/.ssh/deploy_key ${EC2_USER}@${EC2_HOST} << EOF
            set -e
            echo "Deploy started on $(hostname)"
            # ensure docker is installed
            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found, installing..."
              sudo apt-get update
              sudo apt-get install -y docker.io
              sudo systemctl enable --now docker
            fi

            # prepare workspace
            rm -rf ~/deploy_workspace || true
            mkdir -p ~/deploy_workspace
            tar -xzf ~/repo.tar.gz -C ~/deploy_workspace
            cd ~/deploy_workspace

            # build image on EC2
            IMAGE_NAME=ai-resume-analyser
            docker build -t \${IMAGE_NAME}:latest .

            # stop and remove existing container
            docker ps -q --filter "name=${CONTAINER_NAME}" | xargs -r docker stop || true
            docker ps -a -q --filter "name=${CONTAINER_NAME}" | xargs -r docker rm || true

            # run the container
            docker run -d --name ${CONTAINER_NAME} -p ${PORT}:${PORT} -e PORT=${PORT} \${IMAGE_NAME}:latest
            echo "Deploy finished"
          EOF

      - name: Cleanup
        run: |
          rm -f repo.tar.gz

# Required repository secrets:
# - EC2_USER: username on the EC2 instance (e.g., ubuntu)
# - EC2_HOST: public IP or DNS of the EC2 instance
# - EC2_SSH_PORT: SSH port (default 22)
# - EC2_SSH_PRIVATE_KEY: the private SSH key (PEM) with access to EC2_USER on EC2_HOST
# Optional (if you want to push images to Docker Hub):
# - DOCKERHUB_USERNAME
# - DOCKERHUB_TOKEN
